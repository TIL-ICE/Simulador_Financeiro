<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Simulador Financeiro Semanal</title>
</head>
<body>

<h1>Qual seria sua economia com perdas? (Semanal)</h1>
<br>

<label>
<b>Insira quantas toneladas de tilápia exportada anualmente:
<input type="text" id="id_peso_total" placeholder="Digite aqui"> Ton
</b>
</label>

<br><br>

<label>
<b>Insira o preço médio do Kg de tilápia:
$<input type="text" id="id_preco_medio_kg" placeholder="Digite aqui"> USD
</b>
</label>

<br><br>

<button onclick="calcular_simulacao()">
<h3>Simular Economia Semanal</h3>
</button>

<br><br>

<p id="msg_prejuizo"></p>
<p id="msg_economia"></p>

<script>

function calcular_simulacao(){

    let peso_total = Number(id_peso_total.value);
    let preco_medio_kg = Number(id_preco_medio_kg.value);

    let peso_total_kg = peso_total * 1000;
    let preco_medio_total = peso_total_kg * preco_medio_kg;

    
    let valor_total_prejuizo_anual = preco_medio_total * 0.09;

    // Convertendo para semanal (divide por 52 semanas)
    let valor_prejuizo_semanal = valor_total_prejuizo_anual / 52;

    let valor_minimo_economia = valor_prejuizo_semanal * 0.15;
    let valor_maximo_economia = valor_prejuizo_semanal * 0.23;

    msg_prejuizo.innerHTML = 
    `O prejuízo semanal é de <span style="color:red">$ ${valor_prejuizo_semanal.toFixed(2)} USD</span>`;

    msg_economia.innerHTML = 
    `A economia semanal será de <span style="color:green">$ ${valor_minimo_economia.toFixed(2)} USD</span>
     até <span style="color:green">$ ${valor_maximo_economia.toFixed(2)} USD</span>`;

}

</script>

</body>
</html>
